name: CI and releases

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    name: Check (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install Linux GUI runtime dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes libegl1
      - name: Install development dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run checks and text coverage report
        run: python check.py

  build:
    name: Build (${{ matrix.os }})
    needs: check
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: RulesetNotebook-windows
          - os: macos-latest
            artifact: RulesetNotebook-macos
          - os: ubuntu-latest
            artifact: RulesetNotebook-linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install Linux GUI runtime dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes libegl1
      - name: Install packaging dependencies
        run: python -m pip install -e ".[dev]"
      - name: Build application bundle
        run: python build.py
      - name: Archive application bundle
        env:
          ARCHIVE_NAME: ${{ matrix.artifact }}
        run: >-
          python -c "import os, shutil; shutil.make_archive(os.environ['ARCHIVE_NAME'], 'zip', 'dist', 'RulesetNotebook')"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  release:
    name: Publish release archives
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          files=$(find release-artifacts -type f -name '*.zip' -print)
          gh release create "$GITHUB_REF_NAME" $files --generate-notes
